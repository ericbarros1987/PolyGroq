<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    
    <!-- Gradiente secundário -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <!-- Gradiente para brilho -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Sombra -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6D28D9" flood-opacity="0.4"/>
    </filter>
    
    <!-- Brilho interno -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fundo circular com gradiente -->
  <circle cx="256" cy="256" r="240" fill="url(#mainGradient)" filter="url(#shadow)"/>
  
  <!-- Brilho superior -->
  <ellipse cx="256" cy="120" rx="160" ry="80" fill="url(#shineGradient)"/>
  
  <!-- Ondas de conversação (esquerda) -->
  <g opacity="0.3">
    <circle cx="120" cy="280" r="8" fill="white"/>
    <circle cx="100" cy="320" r="6" fill="white"/>
    <circle cx="90" cy="360" r="4" fill="white"/>
  </g>
  
  <!-- Ondas de conversação (direita) -->
  <g opacity="0.3">
    <circle cx="392" cy="280" r="8" fill="white"/>
    <circle cx="412" cy="320" r="6" fill="white"/>
    <circle cx="422" cy="360" r="4" fill="white"/>
  </g>
  
  <!-- Cérebro/IA estilizado -->
  <g filter="url(#glow)">
    <!-- Hemisfério esquerdo -->
    <path d="M180 180 C140 200 120 250 130 300 C140 340 170 380 210 400 C220 405 230 400 235 390 C220 410 190 420 170 410 C130 390 110 340 120 290 C130 240 160 200 200 180 C200 180 190 170 180 180Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Hemisfério direito -->
    <path d="M332 180 C372 200 392 250 382 300 C372 340 342 380 302 400 C292 405 282 400 277 390 C292 410 322 420 342 410 C382 390 402 340 392 290 C382 240 352 200 312 180 C312 180 322 170 332 180Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Corpo central (pessoa) -->
    <path d="M220 320 C220 290 240 260 256 260 C272 260 292 290 292 320 L292 380 C292 410 280 430 256 430 C232 430 220 410 220 380 Z" 
          fill="white" opacity="0.95"/>
  </g>
  
  <!-- Circuitos/neural network (detalhes) -->
  <g stroke="url(#accentGradient)" stroke-width="2" fill="none" opacity="0.6">
    <!-- Linhas neurais -->
    <path d="M180 220 Q200 240 256 240 Q312 240 332 220"/>
    <path d="M160 280 Q200 300 256 300 Q312 300 352 280"/>
    <path d="M170 340 Q200 360 256 360 Q312 360 342 340"/>
    
    <!-- Pontos de conexão -->
    <circle cx="180" cy="220" r="4" fill="#06B6D4"/>
    <circle cx="256" cy="240" r="5" fill="#06B6D4"/>
    <circle cx="332" cy="220" r="4" fill="#06B6D4"/>
    <circle cx="160" cy="280" r="3" fill="#06B6D4"/>
    <circle cx="352" cy="280" r="3" fill="#06B6D4"/>
    <circle cx="256" cy="300" r="4" fill="#06B6D4"/>
    <circle cx="256" cy="360" r="4" fill="#06B6D4"/>
  </g>
  
  <!-- Microfone no topo -->
  <g transform="translate(256, 120)">
    <circle cx="0" cy="0" r="35" fill="url(#accentGradient)"/>
    <path d="M0 -15 L0 5" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M-12 -5 Q-12 10 0 15 Q12 10 12 -5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-6 12 Q0 20 6 12" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Estrelas/esparks decorativas -->
  <g fill="#FBBF24">
    <path d="M400 150 L403 158 L412 158 L405 163 L408 172 L400 167 L392 172 L395 163 L388 158 L397 158 Z" opacity="0.8"/>
    <path d="M112 150 L114 155 L120 155 L116 158 L118 164 L112 160 L106 164 L108 158 L104 155 L110 155 Z" opacity="0.6"/>
    <circle cx="420" cy="200" r="3" opacity="0.5"/>
    <circle cx="92" cy="200" r="3" opacity="0.5"/>
  </g>
  
  <!-- Texto "PG" estilizado -->
  <g transform="translate(256, 430)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="white" opacity="0.95">
      PG
    </text>
  </g>
</svg>
